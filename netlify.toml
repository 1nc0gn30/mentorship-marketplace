[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5186
  functions = "netlify/functions"
  port = 8888
  # auto-loads .env into function env (so the local Stripe test key is picked up)

# Route the SPA's API calls to Netlify Functions.
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/events"
  to = "/.netlify/functions/events"
  status = 200

# Stripe forwards live webhooks here (set the endpoint in the Stripe dashboard to this path).
[[redirects]]
  from = "/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

# SPA fallback.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
