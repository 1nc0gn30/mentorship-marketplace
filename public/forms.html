<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Unstuck forms</title></head>
<body>
  <!-- Netlify Forms: these hidden definitions are parsed at deploy time so the
       forms are registered. The React app POSTs to /apply and /lead with the
       matching form-name field. -->

  <form name="apply" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" value="apply" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="xHandle" />
    <input name="proof" />
    <input name="niche" />
    <textarea name="message"></textarea>
  </form>

  <form name="lead" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" value="lead" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <textarea name="stuck"></textarea>
    <input name="session" />
  </form>

  <form name="expert-contact" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" value="expert-contact" />
    <input name="bot-field" />
    <input name="expertName" />
    <input name="expertHandle" />
    <input name="name" />
    <input name="email" />
    <input name="session" />
    <textarea name="message"></textarea>
  </form>

  <form name="expert-update" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" value="expert-update" />
    <input name="bot-field" />
    <input name="expertName" />
    <input name="expertHandle" />
    <input name="email" />
    <input name="newRate" />
    <textarea name="newBio"></textarea>
    <input name="sessions" />
    <input name="availability" />
    <textarea name="notes"></textarea>
  </form>
</body>
</html>
