<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Unstuck — tactical office hours with proven builders, marketers, and operators. Get unstuck in one call with someone who has already solved your exact founder problem." />
    <meta property="og:title" content="Unstuck — get unstuck in one call" />
    <meta property="og:description" content="Tactical consulting marketplace for indie builders, SaaS founders, and creator-founders. Book a 30-minute working session on a real outcome." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Unstuck — get unstuck in one call</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Ctext x='50' y='66' font-size='56' text-anchor='middle' fill='%2322d3ee'%3E%E2%9C%BF%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Instrument+Sans:wght@400;500;600;700&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('unstuck-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
    <div id="root"></div>

    <!-- Netlify Forms: hidden static definitions parsed at deploy time so the
         forms are registered. The React app POSTs to / with the matching
         form-name field. Honeypot field "bot-field" must be present + empty. -->
    <form name="apply" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" value="apply" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="xHandle" />
      <input name="proof" />
      <input name="niche" />
      <textarea name="message"></textarea>
    </form>
    <form name="lead" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" value="lead" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <textarea name="stuck"></textarea>
      <input name="session" />
    </form>
    <form name="expert-contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" value="expert-contact" />
      <input name="bot-field" />
      <input name="expertName" />
      <input name="expertHandle" />
      <input name="name" />
      <input name="email" />
      <input name="session" />
      <textarea name="message"></textarea>
    </form>
    <form name="expert-update" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" value="expert-update" />
      <input name="bot-field" />
      <input name="expertName" />
      <input name="expertHandle" />
      <input name="email" />
      <input name="newRate" />
      <textarea name="newBio"></textarea>
      <input name="sessions" />
      <input name="availability" />
      <textarea name="notes"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
